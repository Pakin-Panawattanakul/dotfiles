unbind r
bind r source-file ~/.tmux.conf \; display-message "Config updated"

unbind C-b
set -g prefix C-a

set -ga terminal-overrides ",xterm-256color:Tc"
set -g base-index 1
set -g pane-base-index 1
set -g mouse on

# ---------- Status Bar ----------
set -g status-style "bg=#07080d,fg=#e0e2ea,bold"
set -g status-position top
set -g status-justify absolute-centre
set -g message-style "bg=#07080d,fg=#a6dbff,bold"
set -g message-command-style "bg=#a6dbff,fg=#07080d,bold"
# Middle
set -g window-status-format " #I:#W "
set -g window-status-style "fg=#c4c6cd,bg=#07080d"
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "fg=#a6dbff,bg=#07080d,bold"
# Left
set -g status-left "#S "
set -g status-left-style "bg=#07080d,fg=#e0e2ea"
# Right
set -g status-right "#(TZ='Asia/Tokyo' date +%%H:%%M)"
set -g status-right-style "bg=#07080d,fg=#e0e2ea,bold"
set -g mode-style "bg=#a6dbff,fg=#07080d,bold"

# ---------- Key Bind ----------
#bind-key m select-pane -L
#bind-key n select-pane -D
#bind-key e select-pane -U
#bind-key i select-pane -R

#bind -n M-M previous-window
#bind -n M-O next-window

# =--------- Plugins ----------
# List of plugins
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @vim_navigator_mapping_left "C-Left" 
set -g @vim_navigator_mapping_right "C-Right"
set -g @vim_navigator_mapping_up "C-Up"
set -g @vim_navigator_mapping_down "C-Down"
set -g @vim_navigator_mapping_prev ""  # removes the C-\ binding

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'
